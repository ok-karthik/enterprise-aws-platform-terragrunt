# Checkov configuration for Terragrunt-based repositories
# See: https://www.checkov.io/2.Basics/CLI%20Command%20Reference.html

directory:
  - infrastructure-modules
  - infrastructure-live
  - infrastructure-bootstrap

# Output formats
output:
  - cli
  - sarif

# Soft-fail on known low-severity issues that are acceptable in dev environments
soft-fail-on:
  - LOW

# Skip checks that are not applicable to this infrastructure or prototype
skip-check:
  - CKV_AWS_79  # IMDSv1 check (EKS default)
  - CKV_AWS_8   # Detailed monitoring
  - CKV2_AWS_5  # SG attachment (false positive in modules)
  - CKV_TF_1    # Git commit hash (false positive for Registry modules)
  - CKV_GHA_7   # Skip 'workflow_dispatch inputs' check (Manual teardown needs inputs)
  - CKV_AWS_23  # Unrestricted egress (Required for nodes to pull images from public registries)
  - CKV_AWS_58  # EKS Secrets Encryption (Costly/Complex for Dev)
  - CKV_AWS_338 # CloudWatch 1-year retention (Defaults to infinite/0)
  - CKV2_AWS_12 # Default VPC Security Group restrictions (Standard noise in modules)
  - CKV_AWS_341 # Metadata hop limit (Standard in EKS node group modules)
  - CKV_AWS_111 # IAM Write access without constraints (Required for EC2 Describe actions)
  - CKV_AWS_356 # IAM Resource: * (Required for EC2 Describe actions)
  - CKV2_AWS_19 # EIP attachment (Checkov doesn't recognize NAT Gateways as valid attachments)

# Enable deep scanning of external modules from Terraform Registry
download-external-modules: true
