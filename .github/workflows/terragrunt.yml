name: 'Terragrunt CI/CD'

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # Gate 1: Static Analysis
  # ─────────────────────────────────────────────────────────────
  static-analysis:
    name: '🔍 Static Analysis'
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup Platform
        uses: ./.github/actions/setup-platform

      - name: Run TFLint
        run: |
          tflint --init
          tflint --chdir=infrastructure-modules --recursive --format=compact
          tflint --chdir=infrastructure-live --recursive --format=compact
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run Checkov (Static HCL)
        uses: bridgecrewio/checkov-action@v12
        with:
          config_file: .checkov.yaml
          soft_fail: false

  # ─────────────────────────────────────────────────────────────
  # Gate 2: Multi-Environment Planning
  # ─────────────────────────────────────────────────────────────
  plan-dev:
    name: '📝 Plan: Dev'
    needs: [static-analysis]
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v5

      - name: Setup Platform
        uses: ./.github/actions/setup-platform
        with:
          aws_region: ${{ env.AWS_REGION }}
          aws_role_arn: ${{ vars.AWS_ROLE_ARN }}

      - name: Terragrunt Plan (All)
        run: |
          # Terragrunt 1.x requires '--' for passthrough flags like -out
          terragrunt run --all plan --non-interactive -no-color -- -out=tfplan.bin
          # Convert all binary plans to JSON - MUST CD into module dir first
          find . -name "tfplan.bin" -print0 | xargs -0 -I {} sh -c 'cd $(dirname "{}") && terragrunt show -json tfplan.bin > tfplan.json'
        working-directory: infrastructure-live/dev

      - name: Bundle Artifacts
        run: |
          mkdir -p dist
          find infrastructure-live/dev -name "tfplan.json" | cpio -pdm dist

      - name: Upload Plans
        uses: actions/upload-artifact@v4
        with:
          name: plans-dev
          path: dist/
          retention-days: 1

  plan-prod:
    name: '📝 Plan: Prod'
    needs: [static-analysis]
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v5

      - name: Setup Platform
        uses: ./.github/actions/setup-platform
        with:
          aws_region: ${{ env.AWS_REGION }}
          aws_role_arn: ${{ vars.AWS_ROLE_ARN }}

      - name: Terragrunt Plan (All)
        run: |
          # Terragrunt 1.x requires '--' for passthrough flags like -out
          terragrunt run --all plan --non-interactive -no-color -- -out=tfplan.bin
          # Convert all binary plans to JSON - MUST CD into module dir first
          find . -name "tfplan.bin" -print0 | xargs -0 -I {} sh -c 'cd $(dirname "{}") && terragrunt show -json tfplan.bin > tfplan.json'
        working-directory: infrastructure-live/prod

      - name: Bundle Artifacts
        run: |
          mkdir -p dist
          find infrastructure-live/prod -name "tfplan.json" | cpio -pdm dist

      - name: Upload Plans
        uses: actions/upload-artifact@v4
        with:
          name: plans-prod
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # Gate 3: Audit (Parallel Policy & Security)
  # ─────────────────────────────────────────────────────────────
  governance:
    name: '⚖️ Governance Audit'
    if: github.event_name == 'pull_request'
    needs: [plan-dev, plan-prod]
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v5

      - name: Setup Platform
        uses: ./.github/actions/setup-platform

      - name: Download All Plans
        uses: actions/download-artifact@v4
        with:
          path: plans

      - name: Run OPA Policy Gate
        run: |
          echo "Running OPA Governance check on all plan modules..."
          conftest test plans/**/*.json --policy policies/terraform

      - name: Run Checkov Security Gate
        run: |
          echo "Running Checkov Plan Audit..."
          find plans -name "tfplan.json" -exec checkov -f {} --config-file .checkov.yaml \;

  # ─────────────────────────────────────────────────────────────
  # Gate 4: FinOps (Parallel Cost Audit)
  # ─────────────────────────────────────────────────────────────
  finops:
    name: '💰 FinOps Audit'
    if: github.event_name == 'pull_request'
    needs: [plan-dev, plan-prod]
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v5

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Cost Estimate
        run: |
          infracost breakdown --path . \
                             --format json \
                             --out-file /tmp/infracost.json

      - name: Post Cost Comment
        run: |
          set +e
          infracost comment github --path /tmp/infracost.json \
                                   --repo $GITHUB_REPOSITORY \
                                   --github-token ${{ github.token }} \
                                   --pull-request ${{ github.event.pull_request.number }} \
                                   --behavior update
          exit 0

  # ─────────────────────────────────────────────────────────────
  # Phase 5: Deployment (Compliance-First Promotion)
  # ─────────────────────────────────────────────────────────────
  apply-dev:
    name: '🚀 Apply: Dev'
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # MANDATORY GATING: Deployments MUST have passed Governance and FinOps in the PR phase
    # In push mode, we depend on the plan which is the root of the push chain
    needs: [plan-dev, governance, finops] 
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup Platform
        uses: ./.github/actions/setup-platform
        with:
          aws_region: ${{ env.AWS_REGION }}
          aws_role_arn: ${{ vars.AWS_ROLE_ARN }}

      - name: Terragrunt Apply
        run: terragrunt run --all apply --non-interactive -auto-approve
        working-directory: infrastructure-live/dev

  apply-prod:
    name: '🚀 Apply: Prod'
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Total compliance chain from dev to prod
    needs: [apply-dev, plan-prod, governance, finops]
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup Platform
        uses: ./.github/actions/setup-platform
        with:
          aws_region: ${{ env.AWS_REGION }}
          aws_role_arn: ${{ vars.AWS_ROLE_ARN }}

      - name: Terragrunt Apply
        run: terragrunt run --all apply --non-interactive -auto-approve
        working-directory: infrastructure-live/prod
