name: 'Terragrunt CI/CD'

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  id-token: write       # Required for OIDC
  contents: read
  pull-requests: write  # Required to post plan and cost comments
  security-events: write # Required to upload SARIF security reports

jobs:
  # ─────────────────────────────────────────────────────────────
  # Gate 1: Code Quality — TFLint
  # ─────────────────────────────────────────────────────────────
  lint:
    name: '🔍 Lint (TFLint)'
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.54.0

      - name: Init TFLint (download AWS plugin)
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint on modules
        run: tflint --chdir=infrastructure-modules --recursive --format=compact

      - name: Run TFLint on live
        run: tflint --chdir=infrastructure-live --recursive --format=compact

  # ─────────────────────────────────────────────────────────────
  # Gate 2: Security — Checkov + Trivy
  # ─────────────────────────────────────────────────────────────
  security:
    name: '🛡️ Security Scan (Checkov + Trivy)'
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          config_file: .checkov.yaml
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif
          soft_fail: false

      - name: Upload Checkov SARIF to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov

      - name: Run Trivy IaC Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0' # Informational; Checkov is the hard gate

      - name: Upload Trivy SARIF to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ─────────────────────────────────────────────────────────────
  # Gate 3: Cost Estimation — Infracost (informational)
  # Runs AFTER terragrunt plans so it can use the pre-generated plan files.
  # No AWS credentials needed — Infracost reads plan JSON directly.
  # ─────────────────────────────────────────────────────────────
  cost:
    name: '💰 Cost Estimate (Infracost)'
    if: github.event_name == 'pull_request'
    needs: [terragrunt]
    runs-on: ubuntu-latest
    steps:
      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Download Plan Artifacts
        uses: actions/download-artifact@v4
        with:
          path: plans

      - name: Generate Cost Estimates from Plan Files
        run: |
          # Infracost ignores 'name' in config files for JSON plan inputs.
          # We use jq to directly rename projects in the output JSON instead.
          ESTIMATE_FILES=()
          while IFS= read -r plan_json; do
            # Extract: plans/<artifact-slug>/<module-path>/tfplan.json → <module-path>
            module_name=$(echo "$plan_json" | sed 's|plans/[^/]*/||' | sed 's|/tfplan.json$||')
            out_file="$(dirname "$plan_json")/infracost.json"

            # Generate the cost estimate
            infracost breakdown \
              --path "$(pwd)/$plan_json" \
              --format json \
              --out-file "$out_file" || true

            # Rename the project directly in the JSON using jq
            if [ -f "$out_file" ]; then
              jq --arg name "$module_name" '.projects[0].name = $name' \
                "$out_file" > "${out_file}.tmp" && mv "${out_file}.tmp" "$out_file"
              echo "✅ Renamed project to: $module_name"
              ESTIMATE_FILES+=("$out_file")
            fi
          done < <(find plans -name "tfplan.json")

          if [ ${#ESTIMATE_FILES[@]} -eq 0 ]; then
            echo "No tfplan.json files found — ensure plan stage ran successfully"
            exit 0
          fi

          # Merge all renamed estimates into one report
          PATH_ARGS=$(printf ' --path %s' "${ESTIMATE_FILES[@]}")
          infracost output $PATH_ARGS --format json --out-file /tmp/infracost.json

      - name: Post Infracost PR Comment
        continue-on-error: true
        run: |
          # Render the comment locally from our jq-renamed JSON — bypasses Infracost Cloud caching
          infracost output \
            --path /tmp/infracost.json \
            --format github-comment \
            --out-file /tmp/infracost-comment.md

      - name: Post Cost Comment to PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          filePath: /tmp/infracost-comment.md
          comment_tag: infracost_cost_estimate
          mode: recreate

  # ─────────────────────────────────────────────────────────────
  # 1. Stage: Discovery - Find all Terragrunt modules
  # ─────────────────────────────────────────────────────────────
  discover:
    name: 'Discover Modules'
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.set-modules.outputs.modules }}
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Find Modules
        id: set-modules
        run: |
          # Find all directories with terragrunt.hcl, excluding the root and bootstrap
          # This ensures we only run the pipeline for regional/live infrastructure
          MODULES=$(find infrastructure-live -name "terragrunt.hcl" -not -path "*/.terragrunt-cache/*" | xargs -I {} dirname {} | jq -R . | jq -s -c .)
          echo "modules=$MODULES" >> $GITHUB_OUTPUT

  # 2. Stage: Execution - Run Parallel Plans
  terragrunt:
    name: 'Plan: ${{ matrix.module }}'
    needs: [discover, lint, security]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover.outputs.modules) }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      TG_LOG_CUSTOM_FORMAT: "%msg"
    
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: 0.73.0

      - name: Install tf-summarize
        run: |
          # Use a more reliable way to install tf-summarize into a path that works
          curl -sL https://github.com/dineshba/tf-summarize/releases/latest/download/tf-summarize_linux_amd64.tar.gz | tar xz
          mkdir -p $HOME/.local/bin
          mv tf-summarize $HOME/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terragrunt Init & Plan
        id: plan
        run: |
          # Initialize status
          echo "PENDING" > summary.txt

          # 1. Init
          if ! terragrunt init --non-interactive; then
            echo "INIT FAILED" > summary.txt
            exit 1
          fi
          
          # 2. Plan
          # Save the plan binary to an absolute path so 'terragrunt show' can find it
          # (Terragrunt caches internally, so relative 'tfplan' paths break on show)
          PLAN_FILE="$(pwd)/tfplan.bin"
          if ! terragrunt plan --non-interactive -no-color -out="$PLAN_FILE" 2>&1 | tee /dev/stderr | sed 's/^.*terraform: //g' > plan_raw.txt; then
            echo "PLAN FAILED" > summary.txt
            exit 1
          fi
          
          # 3. Summarize using the absolute plan path
          if terragrunt show -json "$PLAN_FILE" > tfplan.json 2>show_err.txt && \
             tf-summarize tfplan.json > summary_new.txt 2>sum_err.txt; then
            mv summary_new.txt summary.txt
          else
            echo "SUMMARIZE FAILED (Plan passed)" > summary.txt
            echo "--- SHOW ERROR ---" >> summary.txt
            cat show_err.txt >> summary.txt || true
            echo "--- SUMMARIZE ERROR ---" >> summary.txt
            cat sum_err.txt >> summary.txt || true
          fi
        working-directory: ${{ matrix.module }}
        continue-on-error: true

      - name: Prepare Metadata
        if: always()
        run: |
          echo "${{ matrix.module }}" > ${{ matrix.module }}/metadata.txt
          # Create a slug for the artifact name (replace slashes with dashes)
          SLUG=$(echo "${{ matrix.module }}" | sed 's/\//-/g')
          echo "SLUG=$SLUG" >> $GITHUB_ENV

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-${{ env.SLUG }}
          path: |
            ${{ matrix.module }}/summary.txt
            ${{ matrix.module }}/plan_raw.txt
            ${{ matrix.module }}/metadata.txt
            ${{ matrix.module }}/tfplan.json
          retention-days: 1

  report:
    name: 'Consolidate Report'
    if: github.event_name == 'pull_request'
    needs: [terragrunt]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Create Master Report
        id: master-report
        run: |
          echo "### 🚀 Terragrunt Plan Summary" > report.md
          echo "" >> report.md
          
          for metadata in $(find results -name "metadata.txt"); do
            dir=$(dirname "$metadata")
            summary="$dir/summary.txt"
            plan_raw="$dir/plan_raw.txt"
            MODULE_NAME=$(cat "$metadata")
            
            # 1. Status Logic
            if [ ! -f "$summary" ]; then
               STATUS="⚠️ UNKNOWN"
               DESC="Plan was interrupted."
            elif grep -q "INIT FAILED" "$summary"; then
               STATUS="❌ FAILED (Init)"
            elif grep -q "PLAN FAILED" "$summary"; then
               STATUS="❌ FAILED (Plan)"
            elif grep -q "SUMMARIZE FAILED" "$summary"; then
               STATUS="✅ PASSED (Summary Error)"
               DESC="Plan succeeded, but we couldn't generate the table. See error below."
            else
               STATUS="✅ SUCCESS"
            fi

            echo "### Module: \`${MODULE_NAME}\` ${STATUS}" >> report.md
            [ -n "$DESC" ] && echo "> $DESC" >> report.md
            
            # 2. Summary Table (Collapsible)
            if [ -f "$summary" ] && ! grep -q "FAILED" "$summary"; then
               # Wrap in code block for alignment
               echo "<details><summary>📦 Click to see changes (Total resources/outputs)</summary>" >> report.md
               echo "" >> report.md
               echo "\`\`\`" >> report.md
               cat "$summary" >> report.md
               echo "\`\`\`" >> report.md
               echo "</details>" >> report.md
            elif [ -f "$summary" ] && grep -q "SUMMARIZE FAILED" "$summary"; then
               # Show the captured error
               echo "<details><summary>❌ Show Summarization Error</summary>" >> report.md
               echo "" >> report.md
               echo "\`\`\`" >> report.md
               cat "$summary" >> report.md
               echo "\`\`\`" >> report.md
               echo "</details>" >> report.md
            fi
            
            # 3. Plan Output (Collapsible)
            if [ -f "$plan_raw" ]; then
              echo "<details><summary>🔍 Click to show full plan output</summary>" >> report.md
              echo "" >> report.md
              echo "\`\`\`terraform" >> report.md
              head -c 50000 "$plan_raw" >> report.md
              echo "\`\`\`" >> report.md
              echo "</details>" >> report.md
            fi
            
            echo "" >> report.md
            echo "[View Detailed Action Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> report.md
            echo "---" >> report.md
          done
          
          echo "*Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*" >> report.md

      - name: Post Master Comment
        uses: thollander/actions-comment-pull-request@v2
        with:
          filePath: report.md
          comment_tag: terragrunt_plan_summary
          mode: recreate
