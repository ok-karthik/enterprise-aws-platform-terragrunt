name: 'Terragrunt CI/CD'

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # Gate 1: Static Analysis (Pre-Plan Quality)
  # ─────────────────────────────────────────────────────────────
  static-analysis:
    name: '🔍 Static Analysis (Lint + Security)'
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup Platform
        uses: ./.github/actions/setup-platform

      - name: Run TFLint
        run: |
          tflint --init
          tflint --chdir=infrastructure-modules --recursive --format=compact
          tflint --chdir=infrastructure-live --recursive --format=compact
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run Checkov (Static HCL)
        uses: bridgecrewio/checkov-action@v12
        with:
          config_file: .checkov.yaml
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif
          soft_fail: false

      - name: Run Trivy IaC Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

  # ─────────────────────────────────────────────────────────────
  # Discovery - Find all Terragrunt modules
  # ─────────────────────────────────────────────────────────────
  discover:
    name: 'Discover Modules'
    runs-on: ubuntu-latest
    outputs:
      dev_modules: ${{ steps.set-dev-modules.outputs.modules }}
      prod_modules: ${{ steps.set-prod-modules.outputs.modules }}
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Discover Dev Modules
        id: set-dev-modules
        run: |
          # Find all directories and create objects with clean names and safe slugs (slashes to dashes)
          MODULES=$(find infrastructure-live/dev -name "terragrunt.hcl" -not -path "*/.terragrunt-cache/*" | xargs -I {} dirname {} | jq -R '{"path": ., "name": sub("infrastructure-live/"; ""), "slug": sub("infrastructure-live/"; "") | gsub("/"; "-")}' | jq -s -c .)
          echo "modules=$MODULES" >> $GITHUB_OUTPUT

      - name: Discover Prod Modules
        id: set-prod-modules
        run: |
          # Find all directories and create objects with clean names and safe slugs (slashes to dashes)
          MODULES=$(find infrastructure-live/prod -name "terragrunt.hcl" -not -path "*/.terragrunt-cache/*" | xargs -I {} dirname {} | jq -R '{"path": ., "name": sub("infrastructure-live/"; ""), "slug": sub("infrastructure-live/"; "") | gsub("/"; "-")}' | jq -s -c .)
          echo "modules=$MODULES" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────
  # Execution - Reusable Plans
  # ─────────────────────────────────────────────────────────────
  plan-dev:
    name: 'Plan (Dev)'
    needs: [discover, static-analysis]
    uses: ./.github/workflows/_terragrunt-plan.yml
    with:
      environment: dev
      module_list: ${{ needs.discover.outputs.dev_modules }}
      aws_region: ${{ vars.AWS_REGION }}
      aws_role_arn: ${{ vars.AWS_ROLE_ARN }}
    secrets: inherit

  plan-prod:
    name: 'Plan (Prod)'
    needs: [discover, static-analysis]
    uses: ./.github/workflows/_terragrunt-plan.yml
    with:
      environment: prod
      module_list: ${{ needs.discover.outputs.prod_modules }}
      aws_region: ${{ vars.AWS_REGION }}
      aws_role_arn: ${{ vars.AWS_ROLE_ARN }}
    secrets: inherit

  # ─────────────────────────────────────────────────────────────
  # Reporting - Cost & Consolidation
  # ─────────────────────────────────────────────────────────────
  cost:
    name: '💰 Cost Estimate (Infracost)'
    if: github.event_name == 'pull_request'
    needs: [plan-dev, plan-prod]
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Download Plan Artifacts
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Cost Estimate
        run: |
          # Use the native config file for multi-project discovery
          # We point Infracost to the results directory where all tfplan.json files are
          infracost breakdown --path results --config-file infracost-config.yml --format json --out-file /tmp/infracost.json

      - name: Post Cost Comment to PR
        run: |
          infracost comment github --path /tmp/infracost.json \
                                   --repo $GITHUB_REPOSITORY \
                                   --github-token ${{ github.token }} \
                                   --pull-request ${{ github.event.pull_request.number }} \
                                   --behavior update

  report:
    name: 'Consolidate Report'
    if: github.event_name == 'pull_request'
    needs: [plan-dev, plan-prod]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Create Master Report
        run: |
          echo "### 🚀 Terragrunt Plan Summary" > report.md
          echo "" >> report.md
          for metadata in $(find results -name "metadata.txt"); do
            dir=$(dirname "$metadata")
            summary="$dir/summary.txt"
            MODULE_NAME=$(cat "$metadata")
            STATUS=$(grep -q "SUCCESS" "$summary" && echo "✅ SUCCESS" || echo "❌ FAILED")
            
            echo "### Module: \`${MODULE_NAME}\` ${STATUS}" >> report.md
            if [ -f "$summary" ]; then
               echo "<details><summary>📦 Click to see changes</summary>" >> report.md
               echo "" >> report.md
               echo "\`\`\`" >> report.md
               cat "$summary" >> report.md
               echo "\`\`\`" >> report.md
               echo "</details>" >> report.md
            fi
            echo "" >> report.md
          done
          echo "*Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*" >> report.md

      - name: Post Master Comment
        uses: thollander/actions-comment-pull-request@v2
        with:
          filePath: report.md
          comment_tag: terragrunt_plan_summary
          mode: recreate

  # ─────────────────────────────────────────────────────────────
  # Deployment - Manual Gates
  # ─────────────────────────────────────────────────────────────
  apply-dev:
    name: 'Apply (Dev)'
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [plan-dev, discover]
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup Platform
        uses: ./.github/actions/setup-platform
        with:
          aws_region: ${{ vars.AWS_REGION }}
          aws_role_arn: ${{ vars.AWS_ROLE_ARN }}

      - name: Terragrunt Apply
        run: terragrunt run --all apply --non-interactive -auto-approve
        working-directory: infrastructure-live/dev

  apply-prod:
    name: 'Apply (Prod)'
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [apply-dev, plan-prod, discover]
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup Platform
        uses: ./.github/actions/setup-platform
        with:
          aws_region: ${{ vars.AWS_REGION }}
          aws_role_arn: ${{ vars.AWS_ROLE_ARN }}

      - name: Terragrunt Apply
        run: terragrunt run --all apply --non-interactive -auto-approve
        working-directory: infrastructure-live/prod
