name: 'Terragrunt CI/CD'

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

env:
  # Force all actions to use Node 24 to avoid deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # Global Region for easy reference
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # Gate 1: Static Analysis (Pre-Plan Quality)
  # ─────────────────────────────────────────────────────────────
  static-analysis:
    name: '🔍 Static Analysis'
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup Platform
        uses: ./.github/actions/setup-platform

      - name: Run TFLint
        run: |
          tflint --init
          tflint --chdir=infrastructure-modules --recursive --format=compact
          tflint --chdir=infrastructure-live --recursive --format=compact
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run Checkov (Static HCL)
        uses: bridgecrewio/checkov-action@v12
        with:
          config_file: .checkov.yaml
          soft_fail: false

  # ─────────────────────────────────────────────────────────────
  # Gate 2: Multi-Environment Planning (Single Stream)
  # ─────────────────────────────────────────────────────────────
  plan-dev:
    name: '📝 Plan: Dev'
    needs: [static-analysis]
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup Platform
        uses: ./.github/actions/setup-platform
        with:
          aws_region: ${{ env.AWS_REGION }}
          aws_role_arn: ${{ vars.AWS_ROLE_ARN }}

      - name: Terragrunt Plan (All)
        run: terragrunt run --all plan --non-interactive -no-color
        working-directory: infrastructure-live/dev

  plan-prod:
    name: '📝 Plan: Prod'
    needs: [static-analysis]
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup Platform
        uses: ./.github/actions/setup-platform
        with:
          aws_region: ${{ env.AWS_REGION }}
          aws_role_arn: ${{ vars.AWS_ROLE_ARN }}

      - name: Terragrunt Plan (All)
        run: terragrunt run --all plan --non-interactive -no-color
        working-directory: infrastructure-live/prod

  # ─────────────────────────────────────────────────────────────
  # Gate 3: FinOps & Governance
  # ─────────────────────────────────────────────────────────────
  finops:
    name: '💰 Cost & Policy'
    if: github.event_name == 'pull_request'
    needs: [plan-dev, plan-prod]
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Cost Estimate
        run: |
          infracost breakdown --path . \
                             --format json \
                             --out-file /tmp/infracost.json

      - name: Post Cost Comment
        run: |
          set +e
          infracost comment github --path /tmp/infracost.json \
                                   --repo $GITHUB_REPOSITORY \
                                   --github-token ${{ github.token }} \
                                   --pull-request ${{ github.event.pull_request.number }} \
                                   --behavior update
          exit 0

  # ─────────────────────────────────────────────────────────────
  # Phase 4: Deployment
  # ─────────────────────────────────────────────────────────────
  apply-dev:
    name: '🚀 Apply (Dev)'
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [plan-dev]
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup Platform
        uses: ./.github/actions/setup-platform
        with:
          aws_region: ${{ env.AWS_REGION }}
          aws_role_arn: ${{ vars.AWS_ROLE_ARN }}

      - name: Terragrunt Apply
        run: terragrunt run --all apply --non-interactive -auto-approve
        working-directory: infrastructure-live/dev

  apply-prod:
    name: '🚀 Apply (Prod)'
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [apply-dev, plan-prod]
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup Platform
        uses: ./.github/actions/setup-platform
        with:
          aws_region: ${{ env.AWS_REGION }}
          aws_role_arn: ${{ vars.AWS_ROLE_ARN }}

      - name: Terragrunt Apply
        run: terragrunt run --all apply --non-interactive -auto-approve
        working-directory: infrastructure-live/prod
