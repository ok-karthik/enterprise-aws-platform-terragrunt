name: 'Terragrunt CI/CD'

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  id-token: write # Required for OIDC
  contents: read
  pull-requests: write # Required to post plan comments

jobs:
  # 1. Stage: Discovery - Find all Terragrunt modules
  discover:
    name: 'Discover Modules'
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.set-modules.outputs.modules }}
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Find Modules
        id: set-modules
        run: |
          # Find all directories with terragrunt.hcl, excluding cache and hidden dirs
          MODULE_DIRS=$(find infrastructure-live infrastructure-bootstrap -name "terragrunt.hcl" -not -path "*/.terragrunt-cache/*" | xargs dirname | sort -u | jq -R -s -c 'split("\n")[:-1]')
          echo "modules=${MODULE_DIRS}" | tee -a "$GITHUB_OUTPUT"

  # 2. Stage: Execution - Run Parallel Plans
  terragrunt:
    name: 'Plan: ${{ matrix.module }}'
    needs: [discover]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover.outputs.modules) }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      TG_LOG_CUSTOM_FORMAT: "%msg"
    
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: 0.73.0

      - name: Install tf-summarize
        run: |
          curl -sL https://github.com/dineshba/tf-summarize/releases/latest/download/tf-summarize_linux_amd64.tar.gz | tar xz
          sudo mv tf-summarize /usr/local/bin/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terragrunt Init & Plan
        id: plan
        run: |
          # 1. Init
          if ! terragrunt init --terragrunt-non-interactive; then
            echo "INIT FAILED" > summary.txt
            exit 1
          fi
          
          # 2. Plan
          if ! terragrunt plan --terragrunt-non-interactive -no-color -out=tfplan 2>&1 | tee /dev/stderr | sed 's/^.*terraform: //g' > plan_raw.txt; then
            echo "PLAN FAILED" > summary.txt
            exit 1
          fi
          
          # 3. Summarize
          terraform show -json tfplan > tfplan.json
          tf-summarize tfplan.json > summary.txt
        working-directory: ${{ matrix.module }}
        continue-on-error: true

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Use the directory name as the artifact name (escaped)
          name: results-${{ strategy.job-index }}
          path: |
            ${{ matrix.module }}/summary.txt
            ${{ matrix.module }}/plan_raw.txt
          retention-days: 1

  # 3. Stage: Reporting - Consolidate all plans into one PR comment
  report:
    name: 'Consolidate Report'
    if: github.event_name == 'pull_request'
    needs: [terragrunt]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Debug Artifact Structure
        run: |
          echo "--- Listing contents of results directory ---"
          ls -R results
          echo "--- Finding all summary.txt files ---"
          find results -name "summary.txt"

      - name: Create Master Report
        id: master-report
        run: |
          set -x
          echo "### 🚀 Terragrunt Plan Summary" > report.md
          echo "" >> report.md
          
          # Use find to locate all summary files regardless of nesting
          for summary in $(find results -name "summary.txt"); do
            echo "Processing summary file: $summary"
            dir=$(dirname "$summary")
            plan_raw="$dir/plan_raw.txt"
            
            # Determine module name from the path
            MODULE_NAME=$(echo "$dir" | awk -F'/' '{print $(NF-1) "/" $NF}')
            echo "Module name resolved to: $MODULE_NAME"
            
            # Check for failure
            if grep -q "FAILED" "$summary"; then
               echo "#### ❌ Module: \`${MODULE_NAME}\` (FAILED)" >> report.md
               echo "> [!CAUTION]" >> report.md
               echo "> The plan for this module failed. Check the [Action Logs](${{ github.server_url }}/${{ github.repo }}/actions/runs/${{ github.run_id }}) for details." >> report.md
            else
               echo "#### 📦 Module: \`${MODULE_NAME}\`" >> report.md
               echo "\`\`\`" >> report.md
               cat "$summary" | tee -a report.md
               echo "\`\`\`" >> report.md
            fi
            
            echo "<details><summary>Show Full Plan Output</summary>" >> report.md
            echo "" >> report.md
            echo "\`\`\`terraform" >> report.md
            # Truncate if very long (Markdown limits)
            head -c 50000 "$plan_raw" >> report.md
            echo "\`\`\`" >> report.md
            echo "</details>" >> report.md
            echo "" >> report.md
            echo "---" >> report.md
          done
          
          echo "*Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*" >> report.md

      - name: Post Master Comment
        uses: thollander/actions-comment-pull-request@v2
        with:
          filePath: report.md
          comment_tag: terragrunt_plan_summary
          mode: recreate
