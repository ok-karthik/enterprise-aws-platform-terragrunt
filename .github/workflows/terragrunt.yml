name: 'Terragrunt CI/CD'

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  id-token: write # Required for OIDC
  contents: read
  pull-requests: write # Required to post plan comments

jobs:
  terragrunt:
    name: 'Terragrunt'
    # Standard runner is faster and more reliable for OIDC + JS Actions
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: 0.54.0

      - name: Terraform Cache
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terragrunt Plan DEV
        if: github.event_name == 'pull_request'
        id: plan
        run: |
          # Use -no-color for cleaner PR comments
          terragrunt run-all plan --terragrunt-non-interactive -no-color > plan_output.txt 2>&1
        continue-on-error: true
        working-directory: live/dev/ap-south-2

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('live/dev/ap-south-2/plan_output.txt', 'utf8');
            const maxColumnLength = 65000;
            const truncatedPlan = plan.length > maxColumnLength ? `${plan.substring(0, maxColumnLength)}... (truncated)` : plan;
            
            const output = `#### Terragrunt Plan (Dev) 🚀
            <details><summary>Show Plan Output</summary>

            \`\`\`terraform
            ${truncatedPlan}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terragrunt Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          terragrunt run-all apply --terragrunt-non-interactive
        working-directory: live/dev/ap-south-2
