name: 'Terragrunt CI/CD'

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # Gate 1: High-Speed Static Analysis
  # ─────────────────────────────────────────────────────────────
  quality-gate:
    name: '🔍 Quality: Lint & Validate'
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v5

      - name: Setup Platform
        uses: ./.github/actions/setup-platform

      - name: Check HCL Formatting
        run: terragrunt hcl format --check

      - name: Terraform Validate
        run: |
          # Validate all modules
          find infrastructure-modules -maxdepth 2 -name "main.tf" -exec sh -c 'cd $(dirname {}) && terraform init -backend=false && terraform validate' \;

      - name: Run TFLint
        run: |
          tflint --init
          tflint --chdir=infrastructure-modules --recursive --format=compact
          tflint --chdir=infrastructure-live --recursive --format=compact
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run Checkov (Static HCL)
        uses: bridgecrewio/checkov-action@v12
        with:
          config_file: .checkov.yaml
          soft_fail: false

      - name: License Compliance Check
        run: ./infrastructure-live/scripts/check-licenses.sh

      - name: Disaster Recovery (Smoke Test)
        run: ./infrastructure-live/scripts/smoke-test.sh

  # ─────────────────────────────────────────────────────────────
  # Gate 2-4: Multi-Environment Orchestration (Reusable)
  # ─────────────────────────────────────────────────────────────
  dev-stack:
    name: 'Dev'
    needs: [quality-gate]
    uses: ./.github/workflows/reusable-terragrunt.yml
    with:
      environment: 'dev'
      working_directory: 'infrastructure-live/dev'
    secrets:
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}

  prod-stack:
    name: 'Prod'
    needs: [quality-gate]
    uses: ./.github/workflows/reusable-terragrunt.yml
    with:
      environment: 'prod'
      working_directory: 'infrastructure-live/prod'
    secrets:
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}

  # ─────────────────────────────────────────────────────────────
  # Phase 5: Deployment (Compliance-First Promotion)
  # ─────────────────────────────────────────────────────────────
  apply-dev:
    name: '🚀 Apply: Dev'
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [dev-stack]
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Git Checkout
        uses: actions/checkout@v5

      - name: Setup Platform
        uses: ./.github/actions/setup-platform
        with:
          aws_region: ${{ env.AWS_REGION }}
          aws_role_arn: ${{ vars.AWS_ROLE_ARN }}

      - name: Terragrunt Apply
        run: terragrunt run --all apply --non-interactive -auto-approve
        working-directory: infrastructure-live/dev

  apply-prod:
    name: '🚀 Apply: Prod'
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [apply-dev, prod-stack]
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Git Checkout
        uses: actions/checkout@v5

      - name: Setup Platform
        uses: ./.github/actions/setup-platform
        with:
          aws_region: ${{ env.AWS_REGION }}
          aws_role_arn: ${{ vars.AWS_ROLE_ARN }}

      - name: Terragrunt Apply
        run: terragrunt run --all apply --non-interactive -auto-approve
        working-directory: infrastructure-live/prod
