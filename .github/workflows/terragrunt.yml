name: 'Terragrunt CI/CD'
# Trigger jumpstart: 2026-04-23

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      target_region:
        description: 'Target AWS Region (Overrides vars.AWS_REGION if provided)'
        required: false
        type: string

permissions:
  id-token: write
  contents: read
  actions: read
  pull-requests: write
  security-events: write

env:
  AWS_REGION: ${{ github.event.inputs.target_region || vars.AWS_REGION }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # Gate 1: High-Speed Static Analysis (TFLint/Checkov)
  # ─────────────────────────────────────────────────────────────
  static-analysis:
    name: '🔍 Static Analysis (TFLint/Checkov)'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ok-karthik/infrastructure-toolchain:feature-improvements
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6

      - name: "Setup Platform"
        uses: ./.github/actions/setup-platform

      - name: "Static Analysis"
        uses: ./.github/actions/static-analysis

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'static-analysis'



  # ─────────────────────────────────────────────────────────────
  # Gate 2-4: Multi-Environment Orchestration (Reusable)
  # ─────────────────────────────────────────────────────────────
  dev-stack:
    name: 'Dev'
    uses: ./.github/workflows/reusable-terragrunt.yml
    with:
      environment: 'dev'
      working_directory: 'infrastructure-live/dev'
      aws_role_arn: ${{ vars.AWS_DEV_ROLE_ARN }}
    secrets:
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}

  prod-stack:
    name: 'Prod'
    uses: ./.github/workflows/reusable-terragrunt.yml
    with:
      environment: 'prod'
      working_directory: 'infrastructure-live/prod'
      aws_role_arn: ${{ vars.AWS_PROD_ROLE_ARN }}
    secrets:
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}

  # ─────────────────────────────────────────────────────────────
  # Phase 5: Deployment (Compliance-First Promotion)
  # ─────────────────────────────────────────────────────────────
  apply-dev:
    name: '🚀 Apply: Dev'
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [dev-stack]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ok-karthik/infrastructure-toolchain:feature-improvements
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 30
    environment: dev
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6

      - name: "Setup Platform"
        uses: ./.github/actions/setup-platform
        with:
          aws_region: ${{ env.AWS_REGION }}
          aws_role_arn: ${{ vars.AWS_DEV_ROLE_ARN }}

      - name: "Terragrunt Apply"
        run: terragrunt run --all apply --non-interactive -auto-approve
        working-directory: infrastructure-live/dev

  apply-prod:
    name: '🚀 Apply: Prod'
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [apply-dev, prod-stack]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ok-karthik/infrastructure-toolchain:feature-improvements
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 30
    environment: prod
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6

      - name: "Setup Platform"
        uses: ./.github/actions/setup-platform
        with:
          aws_region: ${{ env.AWS_REGION }}
          aws_role_arn: ${{ vars.AWS_PROD_ROLE_ARN }}

      - name: "Terragrunt Apply"
        run: terragrunt run --all apply --non-interactive -auto-approve
        working-directory: infrastructure-live/prod
