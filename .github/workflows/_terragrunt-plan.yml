name: 'Terragrunt Plan Job'

# Reusable workflow to handle matrix planning and high-precision governance
on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      module_list:
        required: true
        type: string
      aws_region:
        required: true
        type: string
      aws_role_arn:
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # PHASE 1: Infrastructure Planning
  # ─────────────────────────────────────────────────────────────
  plan:
    name: '🚀 Plan: ${{ matrix.module.name }}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(inputs.module_list) }}
    env:
      AWS_REGION: ${{ inputs.aws_region }}
      AWS_ROLE_ARN: ${{ inputs.aws_role_arn }}
      TG_LOG_CUSTOM_FORMAT: "%msg"
    
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup Platform
        uses: ./.github/actions/setup-platform
        with:
          aws_region: ${{ env.AWS_REGION }}
          aws_role_arn: ${{ env.AWS_ROLE_ARN }}

      - name: Terragrunt Init & Plan
        id: plan
        run: |
          echo "PENDING" > summary.txt
          if ! terragrunt init --non-interactive; then
            echo "INIT FAILED" > summary.txt
            exit 1
          fi
          
          PLAN_FILE="$(pwd)/tfplan.bin"
          if ! terragrunt plan --non-interactive -no-color -out="$PLAN_FILE" 2>&1 | tee /dev/stderr | sed 's/^.*terraform: //g' > plan_raw.txt; then
            echo "PLAN FAILED" > summary.txt
            exit 1
          fi
          
          terragrunt show -json "$PLAN_FILE" > tfplan.json
          tf-summarize tfplan.json > summary.txt || echo "SUMMARIZE FAILED (Plan passed)" > summary.txt
          
          echo "SUCCESS" > status.txt
        working-directory: ${{ matrix.module.path }}

      - name: Bundle Artifacts
        if: always()
        run: |
          mkdir -p dist
          # Copy from the module directory to our flat staging area
          cp ${{ matrix.module.path }}/summary.txt dist/ 2>/dev/null || true
          cp ${{ matrix.module.path }}/plan_raw.txt dist/ 2>/dev/null || true
          cp ${{ matrix.module.path }}/tfplan.json dist/ 2>/dev/null || true
          echo "${{ matrix.module.path }}" > dist/metadata.txt
          
          # Debug: Show what we are about to upload
          echo "Artifacts to be uploaded:"
          ls -R dist

      - name: Upload Plan Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-${{ matrix.module.slug }}
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # PHASE 2: Governance Audit (Policy Checks)
  # ─────────────────────────────────────────────────────────────
  governance:
    name: '🛡️ Policy check: ${{ matrix.module.name }}'
    needs: [plan]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(inputs.module_list) }}
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup Platform
        uses: ./.github/actions/setup-platform

      - name: Download Plan JSON
        uses: actions/download-artifact@v4
        with:
          name: plan-${{ matrix.module.slug }}
          path: plan_data

      - name: Debug Downloaded Files
        run: |
          echo "Content of plan_data:"
          ls -R plan_data

      - name: ⚖️ Policy Gate (OPA)
        run: |
          echo "Running Governance checks on ${{ matrix.module.name }}..."
          if [ ! -f plan_data/tfplan.json ]; then
            echo "Error: tfplan.json not found in plan_data/"
            exit 1
          fi
          conftest test plan_data/tfplan.json --policy $GITHUB_WORKSPACE/policies/terraform

      - name: 🛡️ Security Gate (Checkov Plan)
        uses: bridgecrewio/checkov-action@v12
        with:
          file: plan_data/tfplan.json
          config_file: .checkov.yaml
          soft_fail: true
