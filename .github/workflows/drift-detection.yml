name: 'Drift Detection (Nightly)'

on:
  schedule:
    - cron: '0 6 * * *' # Run daily at 6:00 AM UTC
  workflow_dispatch:      # Allow manual triggering

permissions:
  id-token: write
  contents: read
  issues: write         # Required to create drift alert issues

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  detect-drift:
    name: '🔍 Detect Drift: ${{ matrix.environment }}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, prod]

    container:
      image: ghcr.io/ok-karthik/infrastructure-toolchain:latest
      options: --user root
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    timeout-minutes: 30

    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6

      - name: "Setup Platform"
        uses: ./.github/actions/setup-platform
        with:
          aws_region: ${{ env.AWS_REGION }}
          aws_role_arn: ${{ matrix.environment == 'prod' && vars.AWS_PROD_ROLE_ARN || vars.AWS_DEV_ROLE_ARN }}

      - name: "Check for Infrastructure Drift"
        id: plan
        # -detailed-exitcode returns 2 if there are changes (drift)
        run: |
          set +e
          terragrunt run --all plan --non-interactive -- -detailed-exitcode
          exitcode=$?
          set -e

          if [ $exitcode -eq 2 ]; then
            echo "DRIFT_DETECTED=true" >> $GITHUB_ENV
            echo "Drift detected in ${{ matrix.environment }}! Exit code 2."
          elif [ $exitcode -ne 0 ]; then
            echo "Error running plan. Exit code $exitcode"
            exit 1
          else
            echo "No drift detected. Infrastructure matches code."
          fi
        working-directory: infrastructure-live/${{ matrix.environment }}

      - name: "Alert or Resolve Drift Issue"
        if: always() && steps.plan.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const env = '${{ matrix.environment }}';
            const title = `🚨 Infrastructure Drift Detected: ${env}`;
            const driftDetected = process.env.DRIFT_DETECTED === 'true';

            // 1. Search for existing open issues with this title
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'drift'
            });

            const existingIssue = issues.find(i => i.title === title);

            if (driftDetected) {
              if (existingIssue) {
                console.log(`An open drift issue already exists for ${env}: #${existingIssue.number}. Updating with persistence comment.`);
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existingIssue.number,
                  body: `🔍 **Update**: Drift is still detected in \`${env}\` as of ${new Date().toUTCString()}. Please remediate as soon as possible.`
                });
              } else {
                console.log(`No open drift issue found for ${env}. Creating new one.`);
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: title,
                  body: `The nightly drift detection workflow found that the live infrastructure in \`${env}\` does not match the Terraform state/code.\n\nPlease review the [Action Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) to see the exact resources that have drifted and remediate immediately.`,
                  labels: ["bug", "security", "drift", env]
                });
              }
            } else {
              // Drift is NOT detected (success case)
              if (existingIssue) {
                console.log(`Drift resolved for ${env}! Closing issue #${existingIssue.number}.`);
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existingIssue.number,
                  body: `✅ **Resolved**: The latest drift detection run confirmed that the infrastructure in \`${env}\` is now back in sync with the code. Closing this issue automatically.`
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existingIssue.number,
                  state: 'closed'
                });
              } else {
                console.log(`No drift detected in ${env} and no open issues to close. All good!`);
              }
            }
