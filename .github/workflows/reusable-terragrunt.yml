name: 'Reusable Terragrunt Component'

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      working_directory:
        required: true
        type: string
    secrets:
      INFRACOST_API_KEY:
        required: false

permissions:
  id-token: write
  contents: read
  pull-requests: write # Required for Infracost PR comments

jobs:
  plan:
    name: "📝 Plan: ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v5

      - name: Setup Platform
        uses: ./.github/actions/setup-platform
        with:
          aws_region: ${{ vars.AWS_REGION }}
          aws_role_arn: ${{ vars.AWS_ROLE_ARN }}

      - name: Disaster Recovery (Smoke Test)
        run: ./infrastructure-live/scripts/smoke-test.sh

      - name: Terragrunt Plan
        run: |
          terragrunt run --all plan --non-interactive -no-color -- -out=tfplan.bin
          # Convert binary plans to JSON. We use -ok to ensure we don't fail the whole loop if one conversion fails.
          find . -name "tfplan.bin" -not -path "*/.terragrunt-cache/*" -exec sh -c 'terragrunt show -json {} > $(dirname {})/tfplan.json' \;
        working-directory: ${{ inputs.working_directory }}

      - name: Debug: List Plans
        run: find ${{ inputs.working_directory }} -name "tfplan.json"

      - name: Upload Plans
        uses: actions/upload-artifact@v5
        with:
          name: plans-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}/**/tfplan.json
          if-no-files-found: error
          retention-days: 1

  security-governance:
    name: "⚖️ Security & Governance (OPA/Checkov): ${{ inputs.environment }}"
    needs: [plan]
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v5

      - name: Setup Platform
        uses: ./.github/actions/setup-platform

      - name: Download Plans
        uses: actions/download-artifact@v5
        with:
          name: plans-${{ inputs.environment }}
          path: plans

      - name: OPA Policy Gate (Conftest)
        run: find plans -name "*.json" -print0 | xargs -0 conftest test --policy policies/terraform

      - name: Checkov Security Audit
        run: find plans -name "tfplan.json" -exec checkov -f {} --config-file .checkov.yaml \;

      - name: Generate Compliance Summary
        run: |
          echo "# Compliance Report: ${{ inputs.environment }}" > compliance-report.md
          echo "## 🛡️ Security Audit (Checkov)" >> compliance-report.md
          echo "Status: COMPLETED" >> compliance-report.md
          echo "## ⚖️ Governance Audit (OPA)" >> compliance-report.md
          echo "Status: COMPLETED" >> compliance-report.md
          echo "---" >> compliance-report.md
          echo "Generated by Enterprise CI/CD Pipeline" >> compliance-report.md

      - name: Upload Compliance Report
        uses: actions/upload-artifact@v5
        with:
          name: compliance-${{ inputs.environment }}
          path: compliance-report.md

  cost-analysis:
    name: "💰 Cost Analysis (Infracost): ${{ inputs.environment }}"
    needs: [plan]
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v5

      - name: Setup Infracost
        uses: infracost/actions/setup@v4
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Cost Estimate
        run: |
          infracost breakdown --path ${{ inputs.working_directory }} \
                             --format json \
                             --out-file /tmp/infracost.json

      - name: Post Cost Comment
        if: github.event_name == 'pull_request'
        run: |
          infracost comment github --path /tmp/infracost.json \
                                   --repo $GITHUB_REPOSITORY \
                                   --github-token ${{ github.token }} \
                                   --pull-request ${{ github.event.pull_request.number }} \
                                   --behavior update
