name: 'Reusable Terragrunt Component'

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      working_directory:
        required: true
        type: string
    secrets:
      INFRACOST_API_KEY:
        required: false

permissions:
  id-token: write
  contents: read
  pull-requests: write # Required for Infracost PR comments

jobs:
  plan:
    name: "📝 Plan: ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v5

      - name: Setup Platform
        uses: ./.github/actions/setup-platform
        with:
          aws_region: ${{ vars.AWS_REGION }}
          aws_role_arn: ${{ vars.AWS_ROLE_ARN }}

      - name: Disaster Recovery (Smoke Test)
        run: ./infrastructure-live/scripts/smoke-test.sh

      - name: Terragrunt Plan
        run: |
          # 1. Generate binary plans for all modules in the stack
          terragrunt run --all plan --non-interactive -no-color -- -out=tfplan.bin
          
          # 2. Find and convert binary plans to JSON for Security/Cost auditing
          echo "🔍 Searching for binary plans and converting to JSON..."
          
          # NOTE: We do NOT exclude .terragrunt-cache here because Terragrunt often executes 
          # plans inside the cache directory when dealing with remote modules or specific configurations.
          find . -name "tfplan.bin" | while read -r plan_path; do
            dir_path=$(dirname "$plan_path")
            # Extract the module path by removing the .terragrunt-cache suffix
            module_path=$(echo "$dir_path" | sed 's/\/\.terragrunt-cache.*//')
            echo "Processing plan for module: $module_path"
            
            # 1. CD into the hidden cache directory where the binary plan lives
            # 2. Convert to JSON
            # 3. Move the JSON out of the hidden folder to the module root
            (cd "$dir_path" && terraform show -json tfplan.bin > tfplan.json)
            mv "$dir_path/tfplan.json" "$module_path/tfplan.json"
          done
        working-directory: ${{ inputs.working_directory }}

      - name: "Debug: List All Created Plans"
        run: |
          echo "Checking for tfplan.json files in ${{ inputs.working_directory }}:"
          find ${{ inputs.working_directory }} -name "tfplan.json"

      - name: Upload Plans
        uses: actions/upload-artifact@v5
        with:
          name: plans-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}/**/tfplan.json
          if-no-files-found: error
          retention-days: 1

  security-governance:
    name: "⚖️ Security & Governance (OPA/Checkov): ${{ inputs.environment }}"
    needs: [plan]
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v5

      - name: Setup Platform
        uses: ./.github/actions/setup-platform

      - name: Download Plans
        uses: actions/download-artifact@v5
        with:
          name: plans-${{ inputs.environment }}
          path: plans

      - name: OPA Policy Gate (Conftest)
        run: find plans -name "*.json" -print0 | xargs -0 conftest test --policy policies/terraform

      - name: Checkov Security Audit
        run: find plans -name "tfplan.json" -exec checkov -f {} --config-file .checkov.yaml \;

      - name: Generate Compliance Summary
        run: |
          echo "# Compliance Report: ${{ inputs.environment }}" > compliance-report.md
          echo "## 🛡️ Security Audit (Checkov)" >> compliance-report.md
          echo "Status: COMPLETED" >> compliance-report.md
          echo "## ⚖️ Governance Audit (OPA)" >> compliance-report.md
          echo "Status: COMPLETED" >> compliance-report.md
          echo "---" >> compliance-report.md
          echo "Generated by Enterprise CI/CD Pipeline" >> compliance-report.md

      - name: Upload Compliance Report
        uses: actions/upload-artifact@v5
        with:
          name: compliance-${{ inputs.environment }}
          path: compliance-report.md

  cost-analysis:
    name: "💰 Cost Analysis (Infracost): ${{ inputs.environment }}"
    needs: [plan]
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v5

      - name: Setup Infracost
        uses: infracost/actions/setup@v4
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Cost Estimate
        run: |
          # Use the pre-generated JSON plans for 100% accurate pricing
          find plans -name "tfplan.json" | while read -r plan; do
            # Append each plan to a combined report
            infracost breakdown --path "$plan" --format json --out-file "cost-$(basename $(dirname $plan)).json"
          done
          
          # Combine all reports into one for the PR comment
          infracost output --path "cost-*.json" --format json --out-file /tmp/infracost.json

      - name: Post Cost Comment
        if: github.event_name == 'pull_request'
        run: |
          infracost comment github --path /tmp/infracost.json \
                                   --repo $GITHUB_REPOSITORY \
                                   --github-token ${{ github.token }} \
                                   --pull-request ${{ github.event.pull_request.number }} \
                                   --behavior update \
                                   --tag ${{ inputs.environment }} \
                                   --show-skipped
