name: 'Reusable Terragrunt Component'

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      working_directory:
        required: true
        type: string
    secrets:
      INFRACOST_API_KEY:
        required: false

jobs:
  plan:
    name: "📝 Plan: ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v5

      - name: Setup Platform
        uses: ./.github/actions/setup-platform
        with:
          aws_region: ${{ vars.AWS_REGION }}
          aws_role_arn: ${{ vars.AWS_ROLE_ARN }}

      - name: Terragrunt Plan
        run: |
          terragrunt run --all plan --non-interactive -no-color -- -out=tfplan.bin
          find . -name ".terragrunt-cache" -prune -o -name "tfplan.bin" -print0 | xargs -0 -I {} sh -c 'cd $(dirname "{}") && terragrunt show -json tfplan.bin > tfplan.json'
        working-directory: ${{ inputs.working_directory }}

      - name: Upload Plans
        uses: actions/upload-artifact@v5
        with:
          name: plans-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}/**/tfplan.json
          retention-days: 1

  audit:
    name: "⚖️ Audit: ${{ inputs.environment }}"
    needs: [plan]
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v5

      - name: Setup Platform
        uses: ./.github/actions/setup-platform

      - name: Download Plans
        uses: actions/download-artifact@v5
        with:
          name: plans-${{ inputs.environment }}
          path: plans

      - name: OPA Policy Gate
        run: find plans -name "*.json" -print0 | xargs -0 conftest test --policy policies/terraform

      - name: Checkov Plan Audit
        run: find plans -name "tfplan.json" -exec checkov -f {} --config-file .checkov.yaml \;

      - name: Generate Compliance Summary
        run: |
          echo "# Compliance Report: ${{ inputs.environment }}" > compliance-report.md
          echo "## 🛡️ Security Audit (Checkov)" >> compliance-report.md
          echo "Status: COMPLETED" >> compliance-report.md
          echo "## ⚖️ Governance Audit (OPA)" >> compliance-report.md
          echo "Status: COMPLETED" >> compliance-report.md
          echo "---" >> compliance-report.md
          echo "Generated by Enterprise CI/CD Pipeline" >> compliance-report.md

      - name: Upload Compliance Report
        uses: actions/upload-artifact@v5
        with:
          name: compliance-${{ inputs.environment }}
          path: compliance-report.md

  finops:
    name: "💰 FinOps: ${{ inputs.environment }}"
    needs: [plan]
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v5

      - name: Setup Infracost
        uses: infracost/actions/setup@v4
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Cost Estimate
        run: |
          infracost breakdown --path ${{ inputs.working_directory }} \
                             --format json \
                             --out-file /tmp/infracost.json

      - name: Post Cost Comment
        if: github.event_name == 'pull_request'
        run: |
          infracost comment github --path /tmp/infracost.json \
                                   --repo $GITHUB_REPOSITORY \
                                   --github-token ${{ github.token }} \
                                   --pull-request ${{ github.event.pull_request.number }} \
                                   --behavior update
