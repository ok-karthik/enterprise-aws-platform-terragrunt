name: 'Setup Infrastructure Platform'
description: 'Centralized setup for Terraform, Terragrunt, TFLint, Conftest, and AWS credentials'

inputs:
  terraform_version:
    description: 'Version of Terraform to install'
    required: false
    default: '1.14.8' # renovate: datasource=github-releases depName=hashicorp/terraform
  terragrunt_version:
    description: 'Version of Terragrunt to install'
    required: false
    default: '1.0.1' # renovate: datasource=github-releases depName=gruntwork-io/terragrunt
  tflint_version:
    description: 'Version of TFLint to install'
    required: false
    default: 'v0.54.0' # renovate: datasource=github-releases depName=terraform-linters/tflint
  aws_region:
    description: 'AWS Region for credentials'
    required: false
  aws_role_arn:
    description: 'AWS Role ARN for OIDC authentication'
    required: false
  conftest_version:
    description: 'Version of Conftest to install'
    required: false
    default: '0.68.2' # renovate: datasource=github-releases depName=open-policy-agent/conftest
  tf_summarize_version:
    description: 'Version of tf-summarize to install'
    required: false
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: Pre-validate Inputs
      shell: bash
      run: |
        echo "🔍 Validating inputs..."
        # Fix for 'dubious ownership' when running git in a container
        git config --global --add safe.directory '*'
        
        if [[ -n "${{ inputs.aws_role_arn }}" ]] && [[ -z "${{ inputs.aws_region }}" ]]; then
          echo "❌ ERROR: aws_region is required when aws_role_arn is provided."
          exit 1
        fi
        
        # Verify runner OS
        if [[ "$RUNNER_OS" != "Linux" ]]; then
          echo "❌ ERROR: This action currently only supports Linux runners."
          exit 1
        fi

        # Verify AWS CLI presence
        if ! command -v aws &> /dev/null; then
          echo "❌ ERROR: AWS CLI is not installed. Please ensure it is available in the runner environment."
          exit 1
        fi

    - name: Verify Tools
      shell: bash
      run: |
        echo "🔍 Verifying baked-in toolchain..."
        terraform version || { echo "❌ Terraform missing"; exit 1; }
        terragrunt --version || { echo "❌ Terragrunt missing"; exit 1; }
        tflint --version || { echo "❌ TFLint missing"; exit 1; }
        conftest --version || { echo "❌ Conftest missing"; exit 1; }
        aws --version || { echo "❌ AWS CLI missing"; exit 1; }

    - name: Configure AWS credentials
      if: ${{ inputs.aws_role_arn != '' }}
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ inputs.aws_role_arn }}
        aws-region: ${{ inputs.aws_region }}

    - name: Verify AWS Identity (Idempotency Check)
      if: ${{ inputs.aws_role_arn != '' }}
      shell: bash
      run: |
        echo "🔐 Verifying AWS session..."
        # Added 10s timeout to prevent hangs. Failure here means OIDC was rejected.
        timeout 10 aws sts get-caller-identity --query "Arn" --output text || { 
          echo "❌ ERROR: Failed to verify AWS identity."
          echo "👉 Check if the IAM Role trust policy allows OIDC from this repo/environment."
          exit 1 
        }

    - name: Verify AWS Identity (Idempotency Check)
      if: ${{ inputs.aws_role_arn != '' }}
      shell: bash
      run: |
        echo "🔐 Verifying AWS session..."
        # Added 10s timeout to prevent hangs. Failure here means OIDC was rejected.
        timeout 10 aws sts get-caller-identity --query "Arn" --output text || { 
          echo "❌ ERROR: Failed to verify AWS identity."
          echo "👉 Check if the IAM Role trust policy allows OIDC from this repo/environment."
          exit 1 
        }
