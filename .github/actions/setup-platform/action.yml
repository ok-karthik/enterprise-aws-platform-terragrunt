name: 'Setup Infrastructure Platform'
description: 'Centralized setup for Terraform, Terragrunt, TFLint, Conftest, and AWS credentials'

inputs:
  terraform_version:
    description: 'Version of Terraform to install'
    required: false
    default: '1.14.8'
  terragrunt_version:
    description: 'Version of Terragrunt to install'
    required: false
    default: '1.0.1'
  tflint_version:
    description: 'Version of TFLint to install'
    required: false
    default: 'v0.54.0'
  aws_region:
    description: 'AWS Region for credentials'
    required: false
  aws_role_arn:
    description: 'AWS Role ARN for OIDC authentication'
    required: false
  conftest_version:
    description: 'Version of Conftest to install'
    required: false
    default: '0.68.2'
  tf_summarize_version:
    description: 'Version of tf-summarize to install'
    required: false
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: Pre-validate Inputs
      shell: bash
      run: |
        echo "🔍 Validating inputs..."
        if [[ -n "${{ inputs.aws_role_arn }}" ]] && [[ -z "${{ inputs.aws_region }}" ]]; then
          echo "❌ ERROR: aws_region is required when aws_role_arn is provided."
          exit 1
        fi
        
        # Verify runner OS
        if [[ "$RUNNER_OS" != "Linux" ]]; then
          echo "❌ ERROR: This action currently only supports Linux runners."
          exit 1
        fi

        # Verify AWS CLI presence
        if ! command -v aws &> /dev/null; then
          echo "❌ ERROR: AWS CLI is not installed. Please ensure it is available in the runner environment."
          exit 1
        fi

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: ${{ inputs.terraform_version }}
        terraform_wrapper: false

    - name: Install Tools (Terragrunt, TFLint, Conftest, tf-summarize)
      shell: bash
      run: |
        set -e
        mkdir -p $HOME/.local/bin
        export PATH="$HOME/.local/bin:$PATH"
        
        # Architecture detection
        ARCH=$(uname -m)
        case $ARCH in
          x86_64) ARCH_TG="amd64"; ARCH_TF="amd64"; ARCH_CT="x86_64"; ARCH_SM="amd64" ;;
          aarch64|arm64) ARCH_TG="arm64"; ARCH_TF="arm64"; ARCH_CT="arm64"; ARCH_SM="arm64" ;;
          *) echo "❌ Unsupported architecture: $ARCH"; exit 1 ;;
        esac

        # 1. Terragrunt
        if ! command -v terragrunt &> /dev/null; then
          VERSION="${{ inputs.terragrunt_version }}"
          echo "📦 Installing Terragrunt v${VERSION}..."
          timeout 60 curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${VERSION}/terragrunt_linux_${ARCH_TG}" -o terragrunt
          chmod +x terragrunt
          mv terragrunt $HOME/.local/bin/
        fi

        # 2. TFLint
        if ! command -v tflint &> /dev/null; then
          VERSION="${{ inputs.tflint_version }}"
          echo "📦 Installing TFLint ${VERSION}..."
          timeout 60 curl -sL "https://github.com/terraform-linters/tflint/releases/download/${VERSION}/tflint_linux_${ARCH_TF}.zip" -o tflint.zip
          unzip -q tflint.zip
          chmod +x tflint
          mv tflint $HOME/.local/bin/
          rm tflint.zip
        fi

        # 3. Conftest
        if ! command -v conftest &> /dev/null; then
          VERSION="${{ inputs.conftest_version }}"
          echo "📦 Installing Conftest v${VERSION}..."
          timeout 60 curl -sL "https://github.com/open-policy-agent/conftest/releases/download/v${VERSION}/conftest_${VERSION}_Linux_${ARCH_CT}.tar.gz" | tar xz
          mv conftest $HOME/.local/bin/
        fi

        # 4. tf-summarize
        if ! command -v tf-summarize &> /dev/null; then
          VERSION="${{ inputs.tf_summarize_version }}"
          echo "📦 Installing tf-summarize (${VERSION})..."
          if [ "$VERSION" == "latest" ]; then
            URL="https://github.com/dineshba/tf-summarize/releases/latest/download/tf-summarize_linux_${ARCH_SM}.tar.gz"
          else
            URL="https://github.com/dineshba/tf-summarize/releases/download/${VERSION}/tf-summarize_linux_${ARCH_SM}.tar.gz"
          fi
          timeout 60 curl -sL "$URL" | tar xz
          mv tf-summarize $HOME/.local/bin/
        fi

        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Configure AWS credentials
      if: ${{ inputs.aws_role_arn != '' }}
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ inputs.aws_role_arn }}
        aws-region: ${{ inputs.aws_region }}
        mask-aws-account-id: true

    - name: Verify AWS Identity (Idempotency Check)
      if: ${{ inputs.aws_role_arn != '' }}
      shell: bash
      run: |
        echo "🔐 Verifying AWS session..."
        # Added 10s timeout to prevent hangs in CLI operations
        timeout 10 aws sts get-caller-identity --query "Arn" --output text || { echo "❌ Failed to verify AWS identity (timed out or unauthorized)"; exit 1; }
